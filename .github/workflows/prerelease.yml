name: Prerelease

on:
  push:
    branches:
      - "release-*"

permissions:
  contents: write

jobs:
  prerelease:
    name: Create Prerelease
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build
        run: |
          dotnet restore certinext-caplugin.sln
          dotnet build certinext-caplugin.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test certinext-caplugin.sln \
            --no-build \
            --configuration Release \
            --verbosity normal

      - name: Derive version from branch name
        id: version
        run: |
          # release-1.0 → v1.0.0-pre.<run_number>
          BRANCH="${GITHUB_REF_NAME}"
          BASE=$(echo "$BRANCH" | sed 's/^release-//')
          TAG="v${BASE}.0-pre.${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=CERTInext Plugin ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.name }}" \
            --notes "Automated prerelease from branch \`${GITHUB_REF_NAME}\` at commit \`${GITHUB_SHA:0:7}\`." \
            --prerelease \
            --target "${GITHUB_REF_NAME}"
